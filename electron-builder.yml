appId: "com.universalpenguin.app"
productName: "Universal Penguin"

directories:
  output: "release"

files:
  - "!plugins/"
  - from: "plugins/${os}${arch ? '/' + arch : ''}"
    to: "plugins"
    filter:
      - "**/*"

mac:
  target: "dmg"

win:
  target:
    - "nsis"
    - "portable"

nsis:
  deleteAppDataOnUninstall: true

linux:
  target: "deb"

protocols:
  - name: "Universal Penguin"
    schemes:
      - "universal-penguin"
